<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="AniTrack anime detail page with trailer, legal watch links, manga links, watchlist, and favorites.">
<title>AniTrack — Anime Detail</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a25;--accent:#e63946;--accent2:#ff6b6b;--gold:#ffd166;--text:#f0f0f5;--muted:#888899;--border:rgba(255,255,255,.08);--card-bg:#14141e}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:'Outfit',sans-serif;cursor:pointer}
header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--text)}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:600}
.pill.primary{background:var(--accent);border-color:var(--accent)}
main{padding:1rem}
.page{display:grid;gap:1rem}
.hero{position:relative;border:1px solid var(--border);border-radius:18px;overflow:hidden;background:var(--bg2)}
.hero img{width:100%;height:clamp(240px,44vw,420px);object-fit:cover;display:block}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,15,.15) 35%,rgba(10,10,15,.8) 100%)}
.hero-content{position:absolute;left:0;right:0;bottom:0;padding:1rem}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,52px);letter-spacing:2px;line-height:1}
.subtitle{color:var(--muted);margin-top:6px;font-size:13px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.tag{font-size:11px;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--muted)}
.sections{display:grid;gap:1rem}
.panel{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:1rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.synopsis{color:var(--muted);line-height:1.75;font-size:14px}
.synopsis-toggle{display:inline-block;color:var(--accent);font-size:12px;margin-top:6px;cursor:pointer}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:10px;border:none;font-size:13px;font-weight:600}
.btn.primary{background:var(--accent);color:#fff}
.btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn.link{background:transparent;color:var(--text);border:1px solid var(--border)}
.details{display:grid;gap:10px}
.detail-row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row span:first-child{color:var(--muted)}
.watch-btns{display:flex;flex-wrap:wrap;gap:8px}
.watch-btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 13px;border-radius:10px;font-size:13px;font-weight:600;border:none}
.watch-btn.primary{background:var(--accent);color:#fff}
.watch-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.status{color:var(--muted);font-size:14px;padding:1rem 0}
.loading{display:flex;align-items:center;justify-content:center;min-height:300px}
.spinner{width:34px;height:34px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal.open{display:flex}
.modal-box{width:min(100%,420px);background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:1rem}
.modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin-bottom:8px}
.modal-box p{color:var(--muted);font-size:13px;margin-bottom:14px}
.modal-box input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:12px;outline:none;margin-bottom:10px}
.modal-actions{display:grid;gap:8px}
.note{font-size:12px;color:var(--muted);margin-top:10px}
@media (min-width:900px){main{padding:1.5rem}.page{grid-template-columns:1.2fr .8fr}.wide{grid-column:1 / -1}}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span>ANI</span>TRACK</a>
  <div class="top-actions">
    <button class="pill" id="authStatus" onclick="openAuth()">Guest</button>
    <button class="pill primary" id="authBtn" onclick="openAuth()">Login</button>
    <a class="pill" href="index.html">Home</a>
  </div>
</header>

<main>
  <div class="page">
    <section class="hero wide" id="heroArea">
      <div class="loading"><div class="spinner"></div></div>
    </section>

    <section class="panel">
      <div class="section-title">Overview</div>
      <div class="synopsis" id="synopsis">Loading...</div>
      <div id="synToggleWrap"></div>
      <div class="btns">
        <button class="btn primary" id="watchlistBtn" onclick="toggleWatchlist()">＋ Save to Watchlist</button>
        <button class="btn secondary" id="favoriteBtn" onclick="toggleFavorite()">★ Favorite</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">Details</div>
      <div class="details" id="details"></div>
    </section>

    <section class="panel">
      <div class="section-title">Watch Legally</div>
      <div class="watch-btns" id="watchBtns"></div>
    </section>

    <section class="panel">
      <div class="section-title">Read Manga Legally</div>
      <div class="watch-btns" id="mangaBtns"></div>
      <div class="status" id="mangaNote"></div>
    </section>

    <section class="panel">
      <div class="section-title">Trailer</div>
      <div id="trailerArea" style="aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);">No trailer available</div>
    </section>
  </div>
</main>

<div class="modal" id="authModal">
  <div class="modal-box">
    <h3>Login</h3>
    <p>Save watchlists and favorites across devices.</p>
    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPass" type="password" placeholder="Password">
    <div class="modal-actions">
      <button class="btn primary" onclick="loginEmail()">Sign in</button>
      <button class="btn secondary" onclick="signupEmail()">Sign up</button>
      <button class="btn link" onclick="guestLogin()">Continue as Guest</button>
      <button class="btn link" onclick="closeAuth()">Cancel</button>
    </div>
    <div class="note">Guest mode uses anonymous Firebase auth.</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
import { getFirestore, doc, setDoc, deleteDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYh9qv8YolwJJ4Pu-9iIgY-aJF2U-1l20",
  authDomain: "anime-555.firebaseapp.com",
  projectId: "anime-555",
  storageBucket: "anime-555.firebasestorage.app",
  messagingSenderId: "1024204889528",
  appId: "1:1024204889528:web:8e0ecf872303e1dcda434d",
  measurementId: "G-G1J5F0F3QW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const API='https://api.jikan.moe/v4';

let currentUser=null;
let currentAnime=null;
let currentId=null;
let wlSet=new Set();
let favSet=new Set();
let synopsisFull='';

function qs(name){return new URLSearchParams(location.search).get(name)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
async function api(url){const r=await fetch(url); if(!r.ok) throw new Error('API'); return r.json()}

function openAuth(){document.getElementById('authModal').classList.add('open')}
function closeAuth(){document.getElementById('authModal').classList.remove('open')}
async function guestLogin(){await signInAnonymously(auth); closeAuth()}
async function loginEmail(){const e=document.getElementById('authEmail').value.trim(), p=document.getElementById('authPass').value.trim(); if(!e||!p) return alert('Enter email and password'); await signInWithEmailAndPassword(auth,e,p); closeAuth()}
async function signupEmail(){const e=document.getElementById('authEmail').value.trim(), p=document.getElementById('authPass').value.trim(); if(!e||!p) return alert('Enter email and password'); await createUserWithEmailAndPassword(auth,e,p); closeAuth()}
async function logout(){await signOut(auth)}

function updateAuthUI(){
  const s=document.getElementById('authStatus'), b=document.getElementById('authBtn');
  if(!currentUser){s.textContent='Guest'; b.textContent='Login'; b.onclick=openAuth; return}
  s.textContent=currentUser.isAnonymous?'Guest':'Signed In';
  b.textContent='Logout';
  b.onclick=logout;
}

onAuthStateChanged(auth, async (u)=>{
  currentUser=u||null;
  updateAuthUI();
  if(currentUser) await loadUserData();
  if(currentId) renderSaveBtns();
});

async function loadUserData(){
  const uid=currentUser.uid;
  const wl=await getDocs(collection(db,'users',uid,'watchlist'));
  const fv=await getDocs(collection(db,'users',uid,'favorites'));
  wlSet=new Set(wl.docs.map(d=>String(d.id)));
  favSet=new Set(fv.docs.map(d=>String(d.id)));
  renderSaveBtns();
}

async function ensureAuth(){if(currentUser) return; await signInAnonymously(auth)}
function renderSaveBtns(){
  if(!currentId) return;
  document.getElementById('watchlistBtn').textContent=wlSet.has(String(currentId))?'✓ In Watchlist':'＋ Save to Watchlist';
  document.getElementById('favoriteBtn').textContent=favSet.has(String(currentId))?'★ Favorited':'★ Favorite';
}
async function toggleWatchlist(){
  if(!currentId) return;
  await ensureAuth();
  const id=String(currentId), ref=doc(db,'users',auth.currentUser.uid,'watchlist',id);
  if(wlSet.has(id)){await deleteDoc(ref); wlSet.delete(id)}
  else{await setDoc(ref,{animeId:id,title:currentAnime.title,poster:currentAnime.images?.jpg?.image_url||'',updatedAt:Date.now()}); wlSet.add(id)}
  renderSaveBtns();
}
async function toggleFavorite(){
  if(!currentId) return;
  await ensureAuth();
  const id=String(currentId), ref=doc(db,'users',auth.currentUser.uid,'favorites',id);
  if(favSet.has(id)){await deleteDoc(ref); favSet.delete(id)}
  else{await setDoc(ref,{animeId:id,title:currentAnime.title,poster:currentAnime.images?.jpg?.image_url||'',updatedAt:Date.now()}); favSet.add(id)}
  renderSaveBtns();
}

const WATCH_LINKS=[
  {l:'Crunchyroll',u:'https://www.crunchyroll.com/search?q=',append:true,c:'primary'},
  {l:'Netflix',u:'https://www.netflix.com/search?q=',append:true,c:'secondary'},
  {l:'Prime Video',u:'https://www.amazon.co.uk/s?k=',append:true,c:'secondary'},
  {l:'Muse Asia',u:'https://www.youtube.com/@MuseAsia',append:false,c:'secondary'}
];
const MANGA_LINKS={default:[{l:'VIZ Manga',u:'https://www.viz.com/vizmanga',c:'primary'},{l:'MANGA Plus',u:'https://mangaplus.shueisha.co.jp/',c:'secondary'}]};

function buildMeta(a){
  const tags=[
    a.type,a.episodes?`${a.episodes} eps`:null,a.status,a.year,
    ...(a.genres||[]).slice(0,4).map(g=>g.name)
  ].filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('');
  document.getElementById('details').innerHTML=`
    <div class="detail-row"><span>Score</span><strong style="color:var(--gold)">${a.score?a.score.toFixed(2):'N/A'}</strong></div>
    <div class="detail-row"><span>Rank</span><strong>#${a.rank||'?'}</strong></div>
    <div class="detail-row"><span>Popularity</span><strong>#${a.popularity||'?'}</strong></div>
    <div class="detail-row"><span>Status</span><strong>${esc(a.status||'Unknown')}</strong></div>
    <div class="detail-row"><span>Rating</span><strong>${esc(a.rating||'Unknown')}</strong></div>
    <div class="meta" style="margin-top:10px">${tags}</div>
  `;
}
function buildWatch(a){
  document.getElementById('watchBtns').innerHTML=WATCH_LINKS.map(l=>`<a class="watch-btn ${l.c}" href="${l.append?l.u+encodeURIComponent(a.title):l.u}" target="_blank" rel="noopener">${esc(l.l)}</a>`).join('');
}
function buildManga(a){
  const list=MANGA_LINKS.default;
  document.getElementById('mangaBtns').innerHTML=list.map(l=>`<a class="watch-btn ${l.c}" href="${l.u}" target="_blank" rel="noopener">${esc(l.l)}</a>`).join('');
  document.getElementById('mangaNote').textContent='Official licensed manga platforms. Availability depends on region/title.';
}
function renderSynopsis(a){
  synopsisFull=a.synopsis||'No synopsis available.';
  const short=synopsisFull.length>320?synopsisFull.slice(0,320)+'…':synopsisFull;
  document.getElementById('synopsis').innerHTML=`<span id="synText">${esc(short)}</span>${synopsisFull.length>320?` <span class="synopsis-toggle" id="synToggle">Read more</span>`:''}`;
  const t=document.getElementById('synToggle');
  if(t) t.onclick=()=>toggleSynopsis();
}
function toggleSynopsis(){
  const shown=document.getElementById('synText');
  const toggle=document.getElementById('synToggle');
  const isShort=shown.textContent.endsWith('…');
  shown.innerHTML=esc(isShort?synopsisFull:(synopsisFull.length>320?synopsisFull.slice(0,320)+'…':synopsisFull));
  toggle.textContent=isShort?'Read less':'Read more';
}
function renderTrailer(a){
  const area=document.getElementById('trailerArea');
  const yt=a.trailer?.youtube_id;
  if(yt){area.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${yt}?autoplay=1" allow="autoplay;fullscreen" allowfullscreen style="border:0"></iframe>`; return}
  area.textContent='No trailer available';
}

async function loadAnime(){
  const id=qs('id');
  if(!id){document.body.innerHTML='<div class="status" style="padding:1rem">Missing anime ID.</div>'; return}
  currentId=id;
  try{
    const d=await api(`${API}/anime/${id}/full`);
    const a=d.data;
    currentAnime=a;
    document.title=`AniTrack — ${a.title}`;
    document.getElementById('heroArea').innerHTML=`
      <img src="${a.images?.jpg?.large_image_url||''}" alt="${esc(a.title)}">
      <div class="hero-grad"></div>
      <div class="hero-content">
        <div class="title">${esc(a.title)}</div>
        <div class="subtitle">${esc(a.title_english||a.title_japanese||'')}</div>
        <div class="meta">
          ${(a.genres||[]).slice(0,4).map(g=>`<span class="tag">${esc(g.name)}</span>`).join('')}
          ${a.type?`<span class="tag">${esc(a.type)}</span>`:''}
          ${a.episodes?`<span class="tag">${a.episodes} eps</span>`:''}
          ${a.score?`<span class="tag">★ ${a.score}</span>`:''}
        </div>
      </div>
    `;
    renderSynopsis(a);
    buildMeta(a);
    buildWatch(a);
    buildManga(a);
    renderTrailer(a);
    renderSaveBtns();
  }catch(e){
    document.getElementById('heroArea').innerHTML='<div class="status">Could not load anime details.</div>';
  }
}

window.openAuth=openAuth;
window.closeAuth=closeAuth;
window.guestLogin=guestLogin;
window.loginEmail=loginEmail;
window.signupEmail=signupEmail;
window.logout=logout;
window.toggleWatchlist=toggleWatchlist;
window.toggleFavorite=toggleFavorite;

loadAnime();
</script>
</body>
</html>
